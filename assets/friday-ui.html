<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Friday</title>
  <script>
    (function() {
      if (window.location.search.indexOf('transparent') !== -1) {
        var d = document.documentElement;
        d.classList.add('transparent-mode');
        // Windows 上 WebView2 透明不生效会露出白底，改用深色与 UI 一致
        var dark = '#0a0a0f';
        d.style.background = dark;
        d.style.setProperty('--page-bg', dark);
        if (document.body) {
          document.body.style.background = dark;
          document.body.style.backgroundColor = dark;
        }
        document.addEventListener('DOMContentLoaded', function() {
          document.body.style.setProperty('background', dark, 'important');
          document.body.style.setProperty('background-color', dark, 'important');
        });
      }
    })();
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    .transparent-mode body,
    .transparent-mode { background: #0a0a0f !important; background-color: #0a0a0f !important; overflow: hidden !important; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--page-bg, #030306);
      background-color: var(--page-bg, #030306);
      color: rgba(255,255,255,0.92);
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      perspective: 800px;
    }
    .grid-sphere {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 120vmax;
      height: 120vmax;
      margin-left: -60vmax;
      margin-top: -60vmax;
      transform-style: preserve-3d;
      animation: spin 32s linear infinite;
    }
    .transparent-mode .grid-sphere {
      width: 68vmax;
      height: 68vmax;
      margin-left: -34vmax;
      margin-top: -34vmax;
    }
    .grid-sphere::before,
    .grid-sphere::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.08) 1px, transparent 1px);
      background-size: 4% 4%;
      border-radius: 50%;
      transform: rotateX(75deg) rotateZ(0deg);
    }
    .grid-sphere::after {
      transform: rotateX(75deg) rotateZ(90deg);
      opacity: 0.6;
    }
    .orb {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 180px;
      height: 180px;
      margin-left: -90px;
      margin-top: -90px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(0,212,255,0.35), rgba(0,100,180,0.12));
      box-shadow:
        0 0 60px rgba(0,212,255,0.2),
        inset 0 0 60px rgba(0,212,255,0.08);
      animation: pulse 4s ease-in-out infinite;
      z-index: 1;
    }
    .ring {
      position: absolute;
      left: 50%;
      top: 50%;
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: 50%;
      transform-style: preserve-3d;
      z-index: 0;
    }
    .ring-1 { width: 220px; height: 220px; margin-left: -110px; margin-top: -110px; animation: spin 20s linear infinite reverse; }
    .ring-2 { width: 280px; height: 280px; margin-left: -140px; margin-top: -140px; animation: spin 25s linear infinite; }
    .ring-3 { width: 340px; height: 340px; margin-left: -170px; margin-top: -170px; animation: spin 30s linear infinite reverse; }
    .transparent-mode .ring-1 { width: 130px; height: 130px; margin-left: -65px; margin-top: -65px; }
    .transparent-mode .ring-2 { width: 175px; height: 175px; margin-left: -87.5px; margin-top: -87.5px; }
    .transparent-mode .ring-3 { width: 220px; height: 220px; margin-left: -110px; margin-top: -110px; }
    .transparent-mode .orb { width: 90px; height: 90px; margin-left: -45px; margin-top: -45px; }
    @keyframes spin {
      from { transform: rotateZ(0deg); }
      to { transform: rotateZ(360deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.9; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.02); }
    }
    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 1.5rem;
      max-width: 420px;
    }
    .title {
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.4em;
      color: rgba(0,212,255,0.9);
      margin-bottom: 1.2rem;
    }
    .phase-badge {
      display: inline-block;
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 500;
      margin-bottom: 0.8rem;
      background: rgba(0,212,255,0.15);
      color: rgba(0,212,255,0.95);
      border: 1px solid rgba(0,212,255,0.35);
    }
    .mission-line {
      font-size: 0.9rem;
      line-height: 1.5;
      color: rgba(255,255,255,0.7);
      margin-bottom: 1rem;
    }
    .round {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
    }
    .toggle-logs {
      margin-top: 1rem;
      font-size: 0.75rem;
      color: rgba(0,212,255,0.6);
      cursor: pointer;
      user-select: none;
    }
    .toggle-logs:hover { color: rgba(0,212,255,0.9); }
    .log-drawer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
      text-align: left;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      margin-top: 0.5rem;
    }
    .log-drawer.open { max-height: 160px; overflow-y: auto; }
    .log-drawer .log-item { padding: 0.25rem 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .stream-in { animation: streamIn 0.4s ease; }
    @keyframes streamIn {
      from { opacity: 0.5; transform: translateY(-2px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .live-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: rgba(0,212,255,0.8); margin-right: 0.35rem; box-shadow: 0 0 8px rgba(0,212,255,0.6); animation: livePulse 2s ease-in-out infinite; }
    @keyframes livePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .think-cursor { display: inline-block; width: 2px; height: 1em; background: rgba(0,212,255,0.9); margin-left: 1px; vertical-align: text-bottom; animation: blink 0.8s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <div class="bg">
    <div class="grid-sphere"></div>
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
    <div class="orb"></div>
  </div>
  <div class="content">
    <div class="title">FRIDAY</div>
    <div class="phase-badge" id="phase"><span class="think-cursor"></span></div>
    <div class="mission-line" id="mission"><span class="think-cursor"></span></div>
    <div class="round" id="roundInfo"><span class="live-dot" id="liveDot"></span><span id="roundText"></span></div>
    <div class="toggle-logs" id="toggleLogs">··· 详情</div>
    <div class="log-drawer" id="logDrawer"></div>
  </div>

  <script>
    (function () {
      var isServed = window.location.protocol === 'http:' || window.location.protocol === 'https:';
      var phaseEl = document.getElementById('phase');
      var missionEl = document.getElementById('mission');
      var roundTextEl = document.getElementById('roundText');
      var logDrawer = document.getElementById('logDrawer');
      var missionStreamTimer = null;
      var phaseStreamTimer = null;
      var firstApply = true;
      function streamText(el, newText, speed, done) {
        if (el._streamTimer) clearTimeout(el._streamTimer);
        el._streamTarget = newText;
        el._streamDone = done;
        el._streamIdx = 0;
        el.innerHTML = '';
        var cursor = document.createElement('span');
        cursor.className = 'think-cursor';
        cursor.setAttribute('aria-hidden', 'true');
        el.appendChild(cursor);
        function tick() {
          if (el._streamIdx >= el._streamTarget.length) {
            if (cursor.parentNode === el) el.removeChild(cursor);
            el.textContent = el._streamTarget;
            if (el._streamDone) el._streamDone();
            return;
          }
          el._streamIdx += 1;
          el.textContent = el._streamTarget.slice(0, el._streamIdx);
          el.appendChild(cursor);
          el._streamTimer = setTimeout(tick, speed);
        }
        tick();
      }
      function apply(payload) {
        var s = (payload && payload.state) || {};
        var phase = s.phase || '—';
        var mission = (s.mission || '—').slice(0, 80) + ((s.mission || '').length > 80 ? '…' : '');
        var r = s.loop_round || 0;
        if (phase !== phaseEl._lastPhase) {
          phaseEl._lastPhase = phase;
          if (phaseStreamTimer) clearTimeout(phaseStreamTimer);
          phaseEl.classList.add('stream-in');
          streamText(phaseEl, phase, 70, function () {
            phaseStreamTimer = setTimeout(function () { phaseEl.classList.remove('stream-in'); }, 300);
          });
        }
        if (mission !== missionEl._lastMission) {
          missionEl._lastMission = mission;
          if (missionStreamTimer) clearTimeout(missionStreamTimer);
          missionEl.classList.add('stream-in');
          streamText(missionEl, mission, 48, function () {
            missionStreamTimer = setTimeout(function () { missionEl.classList.remove('stream-in'); }, 300);
          });
        }
        if (firstApply) firstApply = false;
        roundTextEl.textContent = r > 0 ? '第 ' + r + ' 轮' : '';
        var entries = (payload && payload.logs && payload.logs.entries) || [];
        if (entries.length === 0) {
          logDrawer.innerHTML = '<div class="log-item">暂无</div>';
        } else {
          var html = entries.slice(-12).reverse().map(function (e) {
            return '<div class="log-item stream-in">' + (e.phase || '') + ' · ' + (e.desc || '').slice(0, 42) + '</div>';
          }).join('');
          if (logDrawer.innerHTML !== html) {
            logDrawer.innerHTML = html;
          }
        }
      }
      document.getElementById('toggleLogs').onclick = function () {
        document.getElementById('logDrawer').classList.toggle('open');
      };
      if (isServed) {
        var es = new EventSource('/stream');
        es.onmessage = function (e) {
          try {
            var payload = JSON.parse(e.data);
            apply(payload);
          } catch (err) {}
        };
        es.onerror = function () {
          setTimeout(function () { es = new EventSource('/stream'); }, 2000);
        };
      } else {
        fetch('../state/current_mission.json').then(function (r) { return r.ok ? r.json() : null; }).then(function (s) {
          apply({ state: s || {}, logs: { entries: [] } });
        }).catch(function () {});
        setInterval(function () {
          Promise.all([
            fetch('../state/current_mission.json').then(function (r) { return r.ok ? r.json() : null; }).then(function (s) { return s || {}; }),
            fetch('../state/recent_logs.json').then(function (r) { return r.ok ? r.json() : null; }).then(function (d) { return (d && d.entries) || []; })
          ]).then(function (arr) {
            apply({ state: arr[0], logs: { entries: arr[1] } });
          }).catch(function () {});
        }, 1500);
      }
    })();
  </script>
</body>
</html>
